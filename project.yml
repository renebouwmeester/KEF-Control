# xcodegen spec for the iOS app. The Mac app does NOT use this — build.sh
# stays the swiftc path. Regenerate with `xcodegen` after editing; note that
# regenerating overwrites signing edits made in Xcode, so the team id belongs
# in DEVELOPMENT_TEAM below once known.
name: KEFControl
options:
  createIntermediateGroups: true
targets:
  KEFControl:
    type: application
    platform: iOS
    deploymentTarget: "26.0"
    sources:
      - path: Sources/Core
      - path: Sources/iOS
      - path: bluetooth-glyph.png
        buildPhase: resources
    scheme: {}
    info:
      path: Sources/iOS/Info.plist
      properties:
        CFBundleName: KEF Control
        CFBundleDisplayName: KEF Control
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        # The speaker's API is plain HTTP on the LAN.
        NSAppTransportSecurity:
          NSAllowsArbitraryLoads: true
        NSLocalNetworkUsageDescription: >-
          KEF Control finds and controls your KEF speakers on your local
          network.
        NSBonjourServices:
          - _kef-info._tcp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.rene.kef-control-lite
        PRODUCT_NAME: KEF Control
        TARGETED_DEVICE_FAMILY: "1"
        # Same language mode the Mac build gets from plain swiftc.
        SWIFT_VERSION: "5.0"
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
